<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Smart To-Do Manager</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <div class="app-header">
            <h1>🚀 TaskFlow</h1>
            <p>Organize your day efficiently and stay productive</p>
        </div>

        <!-- Statistics -->
        <div class="stats">

            <div class="stat-card">
                <h3 id="totalTasks">0</h3>
                <p>Total Tasks</p>
            </div>

            <div class="stat-card">
                <h3 id="activeTasks">0</h3>
                <p>Active</p>
            </div>

            <div class="stat-card">
                <h3 id="completedTasks">0</h3>
                <p>Completed</p>
            </div>

        </div>

        <!-- Dark Mode Button -->
        <button id="themeToggle">
            🌙 Toggle Dark Mode
        </button>

        <!-- Task Counter -->
        <p id="taskCount">
            0 task(s) remaining
        </p>

        <!-- Input Section -->
        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="addBtn">
                Add Task
            </button>

        </div>

        <!-- Filters -->
        <div class="filters">

            <button data-filter="all" class="active">
                All
            </button>

            <button data-filter="active">
                Active
            </button>

            <button data-filter="completed">
                Completed
            </button>

        </div>

        <!-- Delete Completed -->
        <div class="actions">

            <button id="clearCompleted">
                🗑 Delete Completed
            </button>

        </div>

        <!-- Task List -->
        <ul id="taskList">

        </ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
